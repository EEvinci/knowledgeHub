<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安装更多 Skills · Lavendulin Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #C9544E;
  --primary-light: rgba(201, 84, 78, 0.08);
  --bg: #FAFAFA;
  --card-bg: #FFFFFF;
  --border: #E8E5E3;
  --text: #1A1A1A;
  --text-secondary: #6B6B6B;
  --text-muted: #9B9B9B;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 15px; }
.container { max-width: 800px; margin: 0 auto; padding: 64px 40px 120px; }
.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); text-decoration: none; margin-bottom: 40px; transition: color 150ms; }
.back-link:hover { color: var(--primary); text-decoration: none; }
.back-link svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
.header { margin-bottom: 40px; }
.section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px; }
h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 28px; font-weight: 600; }
.subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.install-block { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
.install-name { font-family: 'Playfair Display', Georgia, serif; font-size: 16px; font-weight: 600; margin-bottom: 8px; }
.install-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
.install-cmd { font-family: 'JetBrains Mono', monospace; font-size: 13px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); }
.footer { margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--border); text-align: center; font-size: 12px; color: var(--text-muted); }
.footer a { color: var(--text-muted); text-decoration: none; }
.footer a:hover { color: var(--primary); }
.footer .year { color: var(--primary); font-family: Georgia, serif; }
@media (max-width: 640px) { .container { padding: 40px 20px 80px; } }
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="/Skills/index.html">
    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Skills 管理
  </a>
  <header class="header">
    <div class="section-label">Skills</div>
    <h1>安装更多 Skills</h1>
    <p class="subtitle">扩展工具能力</p>
  </header>

  <div class="install-block">
    <div class="install-name">ClaWHub</div>
    <div class="install-desc">从 ClawHub 仓库安装社区贡献的 Skills，当前可用 50+</div>
    <div class="install-cmd">npx clawhub install</div>
  </div>

  <div class="install-block">
    <div class="install-name">腾讯 SkillHub</div>
    <div class="install-desc">腾讯提供的 Skill 扩展市场</div>
    <div class="install-cmd">skillhub install</div>
  </div>

  <div class="install-block">
    <div class="install-name">GitHub 独立仓库</div>
    <div class="install-desc">从独立 GitHub 仓库安装特定 Skills</div>
    <div class="install-cmd">git clone & skill_manage create</div>
  </div>

  <footer class="footer">
    <a href="/index.html">Lavendulin Hub</a>
    <span style="margin:0 8px;">·</span>
    <span class="year">2026</span>
  </footer>
</div>
</body>
</html>
