<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lavendulin Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #C9544E;
  --primary-light: rgba(201, 84, 78, 0.08);
  --bg: #FAFAFA;
  --card-bg: #FFFFFF;
  --border: #E8E5E3;
  --text: #1A1A1A;
  --text-secondary: #6B6B6B;
  --text-muted: #9B9B9B;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  font-size: 15px;
}
.container { max-width: 960px; margin: 0 auto; padding: 72px 40px 120px; }

.header { margin-bottom: 56px; }
.logo-row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
.logo-mark {
  width: 40px; height: 40px;
  background: var(--primary);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 600;
}
h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 32px; font-weight: 600; }
.subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

/* 5-card grid */
.sections { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.section-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  text-decoration: none;
  color: var(--text);
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: box-shadow 200ms ease, transform 200ms ease, border-color 200ms ease;
}
.section-card:hover {
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  transform: translateY(-2px);
  border-color: rgba(201,84,78,0.3);
  text-decoration: none;
  color: var(--text);
}
.section-icon {
  width: 36px; height: 36px;
  background: var(--primary-light);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 4px;
}
.section-icon svg { width: 18px; height: 18px; stroke: var(--primary); fill: none; stroke-width: 1.8; }
.section-name { font-family: 'Playfair Display', Georgia, serif; font-size: 16px; font-weight: 600; }
.section-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.section-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: auto; padding-top: 8px; }

.footer {
  margin-top: 72px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 12px; color: var(--text-muted);
}
.footer .year { color: var(--primary); font-family: Georgia, serif; }

@media (max-width: 768px) {
  .container { padding: 48px 20px 80px; }
  .sections { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .sections { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">

  <header class="header">
    <div class="logo-row">
      <div class="logo-mark">L</div>
      <div>
        <h1>Lavendulin Hub</h1>
        <p class="subtitle">Personal Knowledge Hub — lavendulin · 2026</p>
      </div>
    </div>
  </header>

  <div class="sections">

    <a class="section-card" href="/文段解析/index.html">
      <div class="section-icon">
        <svg viewBox="0 0 24 24"><path d="M4 6h16M4 10h12M4 14h16M4 18h10"/></svg>
      </div>
      <div class="section-name">文段解析</div>
      <div class="section-desc">深度思考 · 结构化整理 · 认知升级</div>
      <div class="section-meta">index</div>
    </a>

    <a class="section-card" href="/金融知识/index.html">
      <div class="section-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 6v6l4 2"/></svg>
      </div>
      <div class="section-name">金融知识</div>
      <div class="section-desc">行为金融学 · 市场心理学<br>09:00 & 14:00 自动更新</div>
      <div class="section-meta">dailyfin · index</div>
    </a>

    <a class="section-card" href="/A股分析/index.html">
      <div class="section-icon">
        <svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      </div>
      <div class="section-name">A 股分析</div>
      <div class="section-desc">AI上下游产业链 · 黄金珠宝板块<br>08:00 自动更新</div>
      <div class="section-meta">astock · index</div>
    </a>

    <a class="section-card" href="/每日日记/index.html">
      <div class="section-icon">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
      <div class="section-name">每日日记</div>
      <div class="section-desc">每日感想 · 持续记录</div>
      <div class="section-meta">daily · index</div>
    </a>

    <a class="section-card" href="/Skills/index.html">
      <div class="section-icon">
        <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
      </div>
      <div class="section-name">Skills 管理</div>
      <div class="section-desc">工具能力 · 流程规范 · 扩展安装</div>
      <div class="section-meta">13 skills · index</div>
    </a>

  </div>

  <footer class="footer">
    <span class="year">2026</span>
    <span style="margin:0 8px;">·</span>
    Lavendulin Hub
  </footer>
</div>
</body>
</html>
